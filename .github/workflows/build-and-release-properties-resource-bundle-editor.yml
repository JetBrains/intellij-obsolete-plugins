name: Build and Release Properties Resource Bundle Editor

on:
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Build with Gradle
        run: ./gradlew buildPlugin
        working-directory: properties-resource-bundle-editor

      - name: Read version from build.gradle.kts
        id: version
        run: |
          VERSION=$(grep '^version\s*=' build.gradle.kts | sed 's/version\s*=\s*"\(.*\)"/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
        working-directory: properties-resource-bundle-editor

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: properties-resource-bundle-editor-v${{ steps.version.outputs.version }}
          name: Properties Resource Bundle Editor v${{ steps.version.outputs.version }}
          files: properties-resource-bundle-editor/build/distributions/*.zip
